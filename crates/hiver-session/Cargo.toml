[package]
name = "hiver-session"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = """
Distributed session management for Hiver Framework.
Hiver框架的分布式会话管理。
Equivalent to: Spring Session, @EnableRedisHttpSession
"""
homepage = { workspace = true }
repository = { workspace = true }
readme = "./README.md"
keywords = { workspace = true }
license = { workspace = true }
categories = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["memory"]
memory = []
redis = ["dep:hiver-data-redis"]
mongodb = ["dep:hiver-data-mongodb"]

[dependencies]
# Core types / 核心类型
hiver-core = { path = "../hiver-core", version = "0.1.0-alpha.6" }
serde = { workspace = true }
serde_json = { workspace = true }

# Async runtime / 异步运行时
tokio = { workspace = true, features = ["sync", "time"] }
async-trait = { workspace = true }

# Time / 时间
chrono = { workspace = true }

# UUID / UUID
uuid = { workspace = true, features = ["v4", "serde"] }

# Error handling / 错误处理
thiserror = { workspace = true }

# Redis support / Redis支持
hiver-data-redis = { path = "../hiver-data-redis", version = "0.1.0-alpha.6", optional = true }

# MongoDB support / MongoDB支持
hiver-data-mongodb = { path = "../hiver-data-mongodb", version = "0.1.0-alpha.6", optional = true }

[lints]
workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
hiver-runtime = { path = "../hiver-runtime" }
hiver-macros = { path = "../hiver-macros" }
