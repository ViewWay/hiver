# Auto Publish to crates.io
# 自动发布到 crates.io
#
# Triggers after CI succeeds on main branch.
# 在 main 分支 CI 通过后自动触发。
#
# Flow: CI (ci.yml) passes → detect version change → publish all crates
# 流程：CI (ci.yml) 通过 → 检测版本变更 → 发布所有 crate

name: Auto Publish

permissions:
  contents: read

on:
  # Disabled: conflicts with release.yml tag-based publishing.
  # Use release.yml (push v* tag) for crate publishing.
  # 已禁用：与 release.yml 的 tag 发布冲突。使用 release.yml 推送 v* tag 发布。
  workflow_dispatch:

jobs:
  version-check:
    name: Detect Version Change / 检测版本变更
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_publish: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Get local version / 获取本地版本
        id: check
        run: |
          LOCAL_VERSION=$(sed -nE 's/^\s*version\s*=\s*"(.*?)"$/\1/p' Cargo.toml | head -1)
          echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT

          # Check the first crate (hiver-runtime) as proxy for workspace version
          REMOTE_VERSION=$(cargo search hiver-runtime --limit 1 2>/dev/null | sed -nE 's/^[^"]*"//; s/".*//p')
          REMOTE_VERSION=${REMOTE_VERSION:-none}

          echo "Local: $LOCAL_VERSION, Remote: $REMOTE_VERSION"

          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 Version changed: $REMOTE_VERSION → $LOCAL_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ Version unchanged ($LOCAL_VERSION), skipping publish"
          fi

  publish:
    name: Publish ${{ matrix.package.crate }}
    runs-on: ubuntu-latest
    needs: version-check
    if: needs.version-check.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          # Publish order follows dependency tiers (dependencies first).
          # 发布顺序遵循依赖层级（被依赖的先发布）。

          # Tier 0: No internal hiver deps / 无内部 hiver 依赖
          - crate: hiver-runtime
            path: crates/hiver-runtime
          - crate: hiver-exceptions
            path: crates/hiver-exceptions
          - crate: hiver-response
            path: crates/hiver-response
          - crate: hiver-cloud
            path: crates/hiver-cloud
          - crate: hiver-state-machine
            path: crates/hiver-state-machine
          - crate: hiver-vault
            path: crates/hiver-vault
          - crate: hiver-spel
            path: crates/hiver-spel
          - crate: hiver-ai
            path: crates/hiver-ai
          - crate: hiver-aop
            path: crates/hiver-aop
          - crate: hiver-grpc
            path: crates/hiver-grpc

          # Tier 1: Depend on Tier 0 or already-published crates / 依赖 Tier 0 或已发布
          - crate: hiver-core
            path: crates/hiver-core
          - crate: hiver-config
            path: crates/hiver-config
          - crate: hiver-data-commons
            path: crates/hiver-data-commons
          - crate: hiver-tx
            path: crates/hiver-tx
          - crate: hiver-schedule
            path: crates/hiver-schedule
          - crate: hiver-security
            path: crates/hiver-security
          - crate: hiver-web3
            path: crates/hiver-web3
          - crate: hiver-kafka
            path: crates/hiver-kafka
          - crate: hiver-amqp
            path: crates/hiver-amqp
          - crate: hiver-modulith
            path: crates/hiver-modulith
          - crate: hiver-observability
            path: crates/hiver-observability
          - crate: hiver-ws
            path: crates/hiver-ws
          - crate: hiver-async
            path: crates/hiver-async
          - crate: hiver-batch
            path: crates/hiver-batch
          - crate: hiver-micrometer
            path: crates/hiver-micrometer
          - crate: hiver-i18n
            path: crates/hiver-i18n
          - crate: hiver-ldap
            path: crates/hiver-ldap
          - crate: hiver-integration
            path: crates/hiver-integration
          - crate: hiver-flyway
            path: crates/hiver-flyway
          - crate: hiver-data-redis
            path: crates/hiver-data-redis
          - crate: hiver-data-mongodb
            path: crates/hiver-data-mongodb

          # Tier 2: Depend on Tier 0-1 / 依赖 Tier 0-1
          - crate: hiver-http
            path: crates/hiver-http
          - crate: hiver-router
            path: crates/hiver-router
          - crate: hiver-extractors
            path: crates/hiver-extractors
          - crate: hiver-middleware
            path: crates/hiver-middleware
          - crate: hiver-multipart
            path: crates/hiver-multipart
          - crate: hiver-resilience
            path: crates/hiver-resilience
          - crate: hiver-validation
            path: crates/hiver-validation
          - crate: hiver-events
            path: crates/hiver-events
          - crate: hiver-actuator
            path: crates/hiver-actuator
          - crate: hiver-graphql
            path: crates/hiver-graphql
          - crate: hiver-hateoas
            path: crates/hiver-hateoas
          - crate: hiver-websocket-stomp
            path: crates/hiver-websocket-stomp
          - crate: hiver-retry
            path: crates/hiver-retry
          - crate: hiver-agent
            path: crates/hiver-agent
          - crate: hiver-shell
            path: crates/hiver-shell
          - crate: hiver-data-rdbc
            path: crates/hiver-data-rdbc
          - crate: hiver-cache
            path: crates/hiver-cache
          - crate: hiver-data-annotations
            path: crates/hiver-data-annotations
          - crate: hiver-openapi
            path: crates/hiver-openapi

          # Tier 2 (proc-macro crates): Published after their runtime deps.
          # proc-macro crate 在运行时依赖之后发布。
          - crate: hiver-macros
            path: crates/hiver-macros
          - crate: hiver-data-macros
            path: crates/hiver-data-macros
          - crate: hiver-events-macros
            path: crates/hiver-events-macros
          - crate: hiver-retry-macros
            path: crates/hiver-retry-macros
          - crate: hiver-shell-macros
            path: crates/hiver-shell-macros
          - crate: hiver-validation-annotations
            path: crates/hiver-validation-annotations
          - crate: hiver-lombok
            path: crates/hiver-lombok

          # Tier 3: Depend on multiple layers / 依赖多层
          - crate: hiver-session
            path: crates/hiver-session
          - crate: hiver-data-orm
            path: crates/hiver-data-orm
          - crate: hiver-cli
            path: crates/hiver-cli

          # Tier 4: Aggregation crates / 聚合 crate
          - crate: hiver-test
            path: crates/hiver-test
          - crate: hiver-starter
            path: crates/hiver-starter

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Get releasing version / 获取发布版本
        run: echo NEXT_VERSION=$(sed -nE 's/^\s*version\s*=\s*"(.*?)"$/\1/p' Cargo.toml | head -1) >> $GITHUB_ENV

      - name: Check published version / 检查已发布版本
        run: |
          PREV=$(cargo search ${{ matrix.package.crate }} --limit 1 2>/dev/null | sed -nE 's/^[^"]*"//; s/".*//p')
          echo "PREV_VERSION=${PREV:-none}" >> $GITHUB_ENV

      - name: Publish ${{ matrix.package.crate }}
        if: env.NEXT_VERSION != env.PREV_VERSION
        working-directory: ${{ matrix.package.path }}
        run: |
          echo "📦 Publishing ${{ matrix.package.crate }} $NEXT_VERSION (was: $PREV_VERSION)"
          cargo login ${{ secrets.CRATES_TOKEN }}
          cargo publish --no-verify --allow-dirty
          echo "✅ Published ${{ matrix.package.crate }} $NEXT_VERSION"
