[package]
name = "hiver-shell"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = """
Spring Shell — Interactive CLI REPL framework.
Hiver框架的交互式CLI REPL框架。
Equivalent to: Spring Shell
"""
homepage = { workspace = true }
repository = { workspace = true }
readme = "./README.md"
keywords = { workspace = true }
license = { workspace = true }
categories = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
# Core framework / 核心框架
hiver-core = { path = "../hiver-core", version = "0.1.0-alpha.6" }

# Shell macros / Shell宏
hiver-shell-macros = { path = "../hiver-shell-macros", version = "0.1.0-alpha.6" }

# Error handling / 错误处理
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }

# Async / 异步
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
async-trait = { workspace = true }

# Serialization / 序列化
serde = { workspace = true }
serde_json = { workspace = true }

# CLI / 命令行 (Spring Shell equivalent)
rustyline = { workspace = true }
colored = { workspace = true }
