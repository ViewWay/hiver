[package]
name = "hiver-runtime"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = """
High-performance async runtime for Hiver Framework.
Hiver框架的高性能异步运行时。
Equivalent to: Spring WebFlux Reactor, Project Reactor
"""
homepage = { workspace = true }
repository = { workspace = true }
readme = "./README.md"
keywords = { workspace = true }
license = { workspace = true }
categories = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
# Default backend: async-io (cross-platform epoll/kqueue/IOCP reactor via the
# `async-io` crate). Stable, portable, used by smol.
# 默认后端:async-io（经 `async-io` crate 的跨平台 epoll/kqueue/IOCP reactor）。
# 稳定、可移植,smol 所用。
default = []

# High-performance io_uring backend (Linux only). When enabled on Linux, the
# runtime will prefer a thread-per-core io_uring reactor (via the `io-uring`
# crate, modeled after monoio) over the default async-io reactor. This preserves
# the "self-built high-performance runtime" narrative for latency-sensitive
# Linux deployments.
#
# STATUS: reserved (feature flag + docs only). The concrete `IoUringDriver` is
# NOT yet implemented — it requires a Linux environment to build and benchmark.
# On non-Linux platforms this feature compiles to a no-op (the runtime falls
# back to async-io). When implementing, add:
#   #[cfg(all(target_os = "linux", feature = "io-uring"))]
#   mod iouring;  // a Driver impl backed by the io-uring crate
# and select it in Runtime::with_config when the feature is active on Linux.
#
# 高性能 io_uring 后端（仅 Linux）。在 Linux 上启用时,runtime 将优先使用
# thread-per-core 的 io_uring reactor（经 `io-uring` crate,参考 monoio）而非
# 默认的 async-io reactor。这为延迟敏感的 Linux 部署保留了"自研高性能 runtime"
# 的叙事。
#
# 状态:预留（仅 feature flag + 文档）。具体的 `IoUringDriver` 尚未实现 ——
# 它需要 Linux 环境来构建与基准测试。在非 Linux 平台上此 feature 编译为 no-op
#（runtime 回退到 async-io）。实现时请添加:
#   #[cfg(all(target_os = "linux", feature = "io-uring"))]
#   mod iouring;  // 基于 io-uring crate 的 Driver 实现
# 并在 Runtime::with_config 中,当此 feature 在 Linux 上激活时选用它。
io-uring = []

[dependencies]
# Zero-copy bytes / 零拷贝字节
bytes = { workspace = true }

# Async executor + I/O driver (replaces self-built scheduler/driver)
# 异步执行器 + I/O driver（替代自研 scheduler/driver）
# async-executor provides the multi-task executor; async-io provides the
# cross-platform epoll/kqueue/IOCP reactor + Timer; async-net provides
# TcpListener/TcpStream/UdpSocket; futures-lite provides block_on.
# async-executor 提供多任务执行器;async-io 提供跨平台 epoll/kqueue/IOCP reactor +
# Timer;async-net 提供 TcpListener/TcpStream/UdpSocket;futures-lite 提供 block_on。
async-executor = "1"
async-channel = "2"
async-io = "2"
async-net = "2"
blocking = "1"
futures-lite = "2"

# Concurrency utilities / 并发工具 (Spring Task Executor)
rustc-hash = "2.1"
flume = "0.11"
num_cpus = "1.16"
crossbeam = "0.8"

# Core container (IoC equivalent) / 核心容器（IoC等价）
# Equivalent to: Spring Core Container, ApplicationContext
arc-swap = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
once_cell = { workspace = true }

# Timer / 定时器 (Spring @Scheduled)
time = { workspace = true }

# Async utilities / 异步工具
# Equivalent to: Spring Reactive, Project Reactor
futures = { workspace = true }
futures-util = { workspace = true }
pin-project = { workspace = true }
pin-project-lite = { workspace = true }

# Error handling / 错误处理 (Spring Exception Handling)
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging / 日志 (Spring Logging, Logback)
tracing = { workspace = true }
tracing-core = { workspace = true }

# Platform-specific dependencies / 平台特定依赖
[target.'cfg(target_os = "linux")'.dependencies]
io-uring = "0.7.11"
libc = "0.2"

[target.'cfg(not(target_os = "linux"))'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
# For kqueue support on macOS
kqueue = "1.0"

[target.'cfg(target_os = "freebsd")'.dependencies]
# For kqueue support on FreeBSD
kqueue = "1.0"

[target.'cfg(target_os = "netbsd")'.dependencies]
# For kqueue support on NetBSD
kqueue = "1.0"

[target.'cfg(target_os = "openbsd")'.dependencies]
# For kqueue support on OpenBSD
kqueue = "1.0"

[target.'cfg(target_os = "dragonfly")'.dependencies]
# For kqueue support on DragonFlyBSD
kqueue = "1.0"

[dev-dependencies]
# Testing / 测试 (Spring Test)
criterion = { workspace = true }
quickcheck = { workspace = true }
quickcheck_macros = { workspace = true }
proptest = { workspace = true }

# Async runtime for testing (Spring Test Context)
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }

# Benchmark suite
# 基准测试套件
[[bench]]
name = "runtime_bench"
harness = false
