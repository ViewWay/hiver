[package]
name = "hiver-state-machine"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = """
State machine implementation for Hiver Framework with hierarchical states and transitions.
Hiver框架的状态机实现，支持分层状态和转换。
Equivalent to: Spring State Machine
"""
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
hiver-core = { path = "../hiver-core", version = "0.1.0-alpha.6" }
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "2.0"

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
