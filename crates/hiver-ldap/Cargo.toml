[package]
name = "hiver-ldap"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = """
Spring LDAP — Directory service integration.
Nexus框架的LDAP目录服务集成。
Equivalent to: Spring LDAP
"""
homepage = { workspace = true }
repository = { workspace = true }
readme = "./README.md"
keywords = { workspace = true }
license = { workspace = true }
categories = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
# Core framework / 核心框架
hiver-core = { path = "../hiver-core" }

# Error handling / 错误处理
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }

# Async / 异步
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
async-trait = { workspace = true }

# Serialization / 序列化
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }

# Utilities / 工具
parking_lot = { workspace = true }

# LDAP client (optional) / LDAP客户端（可选）
ldap3 = { version = "0.12", optional = true }

[features]
default = []
# Enable real LDAP connectivity via ldap3 / 通过ldap3启用真实LDAP连接
ldap = ["ldap3"]
