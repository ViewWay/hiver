# Performance Benchmarking
# 性能基准测试
#
# This workflow runs performance benchmarks and tracks changes over time.
# 此工作流运行性能基准测试并跟踪随时间的变化。

name: Benchmark

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies / 安装系统依赖
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libcurl4-openssl-dev \
            libsasl2-dev \
            protobuf-compiler

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        run: |
          cargo criterion --workspace --all-features \
            --message-format=json | tee benchmark-results.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # auto-push disabled until a gh-pages baseline branch is set up.
          # Without a baseline the action has nothing to compare against, so
          # keep fail-on-alert off to avoid blocking CI on first runs.
          # Once gh-pages exists, flip auto-push to true and re-enable
          # fail-on-alert to catch performance regressions.
          auto-push: false
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@ViewWay'

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion
            benchmark-results.json
          retention-days: 30

  # ==============================================================================
  # Summary Report / 总结报告
  # ==============================================================================
  summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'push'
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results

      - name: Generate summary
        run: |
          echo "## 📊 Benchmark Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Benchmark completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📈 View detailed results in the artifacts above." >> $GITHUB_STEP_SUMMARY
