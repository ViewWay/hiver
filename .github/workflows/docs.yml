# Documentation Publishing
# 文档发布
#
# Builds and publishes documentation to GitHub Pages.
# 构建文档并发布到 GitHub Pages。

name: Docs

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook and plugins
        run: |
          # Install mdBook
          tag=$(curl -sL 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz
          sudo mv mdbook /usr/local/bin
          mdbook --version

          # Install mdBook plugins
          cargo install mdbook-toc mdbook-mermaid

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies / 安装系统依赖
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libcurl4-openssl-dev \
            libsasl2-dev \
            protobuf-compiler

      - name: Build mdBook guide
        run: |
          # Run from project root — book.toml is at root, src is docs/book/src
          mdbook build
          # Output: docs/book/book/

      - name: Build Rust API documentation
        run: |
          cargo doc --all-features --no-deps --workspace 2>&1 || true
          echo '<meta http-equiv="refresh" content="0; url=hiver_runtime">' > target/doc/index.html

      - name: Merge documentation
        run: |
          # Create final output directory
          mkdir -p target/pages

          # mdBook guide as the main site
          if [ -d "docs/book/book" ]; then
            cp -r docs/book/book/* target/pages/
          fi

          # Rust API docs under /api/
          if [ -d "target/doc" ]; then
            mkdir -p target/pages/api
            cp -r target/doc/* target/pages/api/
          fi

          # Add .nojekyll for GitHub Pages
          touch target/pages/.nojekyll

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/pages

  test:
    name: Test Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies / 安装系统依赖
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libcurl4-openssl-dev \
            libsasl2-dev \
            protobuf-compiler

      - name: Run documentation tests
        run: cargo test --doc --all-features --workspace
