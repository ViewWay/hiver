# Hiver Framework CI Pipeline
# Hiver框架CI流水线
#
# Runs on every push to main and every PR.
# 每次 push 到 main 和每个 PR 都会运行。
#
# Jobs: fmt → clippy → build → test → audit (all parallel)
# 发布由 auto-publish.yml 在 CI 通过后自动触发。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting / 检查格式
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy / 运行 Clippy
        run: cargo clippy --workspace --lib -- -W warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace / 构建工作空间
        run: cargo build --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run tests / 运行测试
        run: cargo test --workspace --lib --exclude hiver-benches

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit / 安装 cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit / 运行安全审计
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2025-0123 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0172
