[package]
name = "nexus-data-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Procedural macros for Nexus data layer"
keywords = ["nexus", "data", "orm", "macros", "derive"]
categories = ["development-tools::procedural-macro-helpers"]

[lib]
proc-macro = true

[dependencies]
# Proc macro toolkit
syn = { workspace = true, features = ["extra-traits"] }
quote = { workspace = true }
proc-macro2 = { workspace = true }
darling = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Attribute macros
proc-macro-error = { workspace = true }

# Async support
async-trait = { workspace = true }

[dev-dependencies]
nexus-data-orm = { path = "../nexus-data-orm" }
nexus-data-commons = { path = "../nexus-data-commons" }
nexus-data-rdbc = { path = "../nexus-data-rdbc" }
