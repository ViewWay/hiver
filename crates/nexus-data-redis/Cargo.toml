[package]
name = "nexus-data-redis"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Redis integration for Nexus framework (RedisTemplate, Cache)"
keywords = ["nexus", "data", "redis", "cache", "database"]
categories = ["database", "asynchronous"]

[features]
default = []

# Enable async runtime support
runtime = ["dep:nexus-runtime"]

# Connection pooling
pool = ["dep:deadpool", "dep:deadpool-redis"]

# Cluster support
cluster = ["redis/cluster-async"]

# All features
all = ["runtime", "pool", "cluster"]

[dependencies]
# Data commons
nexus-data-commons = { path = "../nexus-data-commons" }

# Data macros for Model derive
nexus-data-macros = { path = "../nexus-data-macros" }

# Async runtime (optional)
nexus-runtime = { path = "../nexus-runtime", optional = true }

# Redis driver
redis = { version = "0.32", features = ["aio", "tokio-comp", "connection-manager"] }

# Connection pool (optional)
deadpool = { version = "0.12", optional = true }
deadpool-redis = { version = "0.22", optional = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Async trait support
async-trait = { workspace = true }

# UUID support
uuid = { version = "1.12", features = ["v4", "serde"] }

# Chrono for datetime
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = { workspace = true }

# Futures support
futures-util = "0.3"

# Tokio for async runtime
tokio = { workspace = true, features = ["sync"] }
