[package]
name = "nexus-benches"
version = { workspace = true }
edition = { workspace = true }
publish = false

[lib]
name = "nexus_benches"
path = "lib.rs"

[dependencies]
nexus-http = { path = "../nexus-http" }
nexus-runtime = { path = "../nexus-runtime" }
nexus-router = { path = "../nexus-router" }
nexus-extractors = { path = "../nexus-extractors" }
nexus-security = { path = "../nexus-security" }
nexus-data-orm = { path = "../nexus-data-orm" }
criterion = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[[bench]]
name = "http_server"
harness = false
path = "http_server.rs"

[[bench]]
name = "router"
harness = false
path = "router.rs"

[[bench]]
name = "extractors"
harness = false
path = "extractors.rs"

[[bench]]
name = "runtime_driver"
harness = false
path = "runtime_driver.rs"

[[bench]]
name = "http_techpower"
harness = false
path = "http_techpower.rs"

[[bench]]
name = "data_orm"
harness = false
path = "data_orm.rs"

[[bench]]
name = "security"
harness = false
path = "security.rs"
