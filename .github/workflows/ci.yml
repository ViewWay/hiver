# Hiver Framework CI Pipeline
# Hiver框架CI流水线
#
# Runs on every push to main and every PR.
# 每次 push 到 main 和每个 PR 都会运行。
#
# Jobs: fmt → clippy → build → test → audit → deny → msrv (all parallel)
# 发布由 release.yml 在推送 v* tag 后自动触发。

name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**/*.md'
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR — saves runner minutes.
# 取消同一分支/PR 上被取代的运行 —— 节省 runner 分钟数。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting / 检查格式
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy / 运行 Clippy
        run: cargo clippy --workspace --lib -- -W warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace / 构建工作空间
        run: cargo build --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run tests / 运行测试
        run: |
          cargo test --workspace --lib --exclude hiver-benches -- --test-threads=1
          # Runtime tests now fully pass — all 3 UBs fixed and valgrind-clean:
          #   - io_uring mmap offsets (IORING_OFF_CQ_RING/SQES) — EINVAL fixed (46d5386)
          #   - wake_clone must forget(handle) — UAF fixed (2dfd7f2)
          #   - io_uring_enter timeout via EXT_ARG — sigsz uninit fixed (7dd3083)
          # valgrind ERROR SUMMARY: 0 errors. Runtime covered by main test job.

      - name: Run integration tests (socket / waker / e2e) / 运行集成测试(socket / waker / e2e)
        run: |
          # These exercise real sockets on THIS platform's driver:
          #   - Linux (here): epoll + io_uring FD→waker path
          #   - macOS (local dev): kqueue FD→waker path
          # 这些在本平台 driver 上演练真实 socket:
          #   - Linux(此处):epoll + io_uring FD→waker 路径
          #   - macOS(本地开发):kqueue FD→waker 路径
          cargo test -p hiver-runtime --test waker_tcp_test -- --test-threads=1
          # The http_server_e2e test spawns the example binary over a real socket.
          # Build the binary first so the subprocess test can find it.
          # http_server_e2e 测试经真实 socket 启动示例二进制。先构建二进制,
          # 使子进程测试能找到它。
          cargo build -p hiver-examples --bin http_server_example
          cargo test -p hiver-tests --test e2e http_server_e2e -- --test-threads=1

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit / 安装 cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit / 运行安全审计
        # NOTE: the ignore list is tracked here (not in deny.toml) because
        # cargo-audit and cargo-deny have different ignore granularity and
        # these specific RUSTSEC ids are known/accepted transitive advisories.
        # The `deny` job below covers license/bans/source checks.
        # 注意：忽略列表在此跟踪（不在 deny.toml 中），因为 cargo-audit 和
        # cargo-deny 的忽略粒度不同，这些 RUSTSEC id 是已知/接受的传递性公告。
        # 下面的 `deny` job 覆盖 license/bans/source 检查。
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2025-0123 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0172

  # Authoritative license / bans / source-registry check using deny.toml.
  # Splits cleanly from `audit` above (advisory ignore granularity differs).
  # 使用 deny.toml 的权威 license / bans / source-registry 检查。
  # 与上面的 `audit`（公告忽略粒度不同）清晰分离。
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny / 安装 cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo-deny / 运行 cargo-deny
        run: cargo deny check advisories licenses bans sources

  # Verify the declared Minimum Supported Rust Version (Cargo.toml: rust-version = "1.91").
  # NOTE: bumped from 1.87 after the MSRV job revealed deps (alloy@2.0.5 etc.)
  # require up to rustc 1.91. The previous value was incorrect.
  # 验证声明的最低支持 Rust 版本（Cargo.toml: rust-version = "1.91"）。
  # 注意：MSRV job 发现依赖（alloy@2.0.5 等）要求 rustc 1.91，故从 1.87 上调。
  msrv:
    name: MSRV 1.91
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.91 toolchain
        uses: dtolnay/rust-toolchain@1.91

      - name: Install system dependencies / 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: Verify workspace builds on MSRV / 验证 workspace 在 MSRV 上构建
        run: cargo check --workspace --lib
