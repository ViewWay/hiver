[package]
name = "hiver-websocket-stomp"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = """
STOMP protocol over WebSocket for Hiver Framework.
Hiver框架基于 WebSocket 的 STOMP 协议支持。
Equivalent to: Spring WebSocket, Spring STOMP
"""

[dependencies]
hiver-http = { path = "../hiver-http", version = "0.1.0-alpha.6" }
hiver-router = { path = "../hiver-router", version = "0.1.0-alpha.6" }
hiver-core = { path = "../hiver-core", version = "0.1.0-alpha.6" }

tokio = { workspace = true, features = ["full"] }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
bytes = { workspace = true }
uuid = { workspace = true }
async-trait = { workspace = true }

tracing = { workspace = true }
thiserror = { workspace = true }

# STOMP protocol
base64 = { workspace = true }
md-5 = { workspace = true }

serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
hiver-runtime = { path = "../hiver-runtime" }
hiver-macros = { path = "../hiver-macros" }
tokio-test = { workspace = true }
