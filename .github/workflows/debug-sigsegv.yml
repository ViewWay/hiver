# Phase 0.1 诊断 workflow：复现 runtime SIGSEGV 并拿 gdb backtrace
# 触发：手动 (workflow_dispatch) 或本文件变更
# 背景：cargo test --workspace 时 hiver-runtime --lib 进程 signal 11 SIGSEGV（单跑通过）
# 根因调查见 docs/superpowers/plans/2026-06-13-development-roadmap.md Phase 0.1
# 主嫌疑：raw_task.rs poll_impl Ready 路径 drop_in_place(future) 触发 re-entrant dec_ref
name: Debug SIGSEGV

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/debug-sigsegv.yml'

jobs:
  reproduce:
    name: Reproduce & backtrace runtime SIGSEGV
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install gdb
        run: sudo apt-get update && sudo apt-get install -y gdb libcurl4-openssl-dev

      - name: Configure core dumps
        run: |
          sudo sysctl -w kernel.core_pattern='/tmp/core.%p.%s' || true
          sudo sysctl -w fs.suid_dumpable=2 || true

      - name: Build test binaries
        run: cargo test --workspace --no-fail-fast --no-run

      - name: Run workspace tests (up to 5x — UB is probabilistic)
        run: |
          ulimit -c unlimited
          export RUST_BACKTRACE=full
          export RUST_LIB_BACKTRACE=full
          for i in 1 2 3 4 5; do
            echo "=========== run $i ==========="
            cargo test --workspace --no-fail-fast 2>&1 | tee -a runs.log || true
            if ls /tmp/core.* >/dev/null 2>&1; then
              echo ">>> SIGSEGV reproduced on run $i"
              break
            fi
          done
          echo "=== cores ==="
          ls -la /tmp/core.* 2>/dev/null || echo "no cores — SIGSEGV did NOT reproduce on Linux (UB may be macOS/kqueue-specific or address-layout dependent; next step: add macOS matrix)"

      - name: gdb backtrace from cores
        if: always()
        run: |
          for core in /tmp/core.*; do
            [ -f "$core" ] || continue
            echo "============================="
            echo "=== backtrace: $core ==="
            echo "============================="
            gdb -batch -ex "set pagination off" -ex "bt full" -ex "thread apply all bt" "$core" 2>&1 || true
          done

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p diagnostics
          cp /tmp/core.* diagnostics/ 2>/dev/null || true
          cp runs.log diagnostics/ 2>/dev/null || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sigsegv-diagnostics
          path: diagnostics/
          if-no-files-found: ignore
