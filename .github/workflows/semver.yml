# Semantic Versioning Checks
# 语义版本检查
#
# This workflow detects breaking API changes that require version bumps.
# 此工作流检测需要版本升级的破坏性 API 更改。

name: SemVer Checks

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  semver-check:
    name: API Compatibility Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      # NOTE: do NOT append `|| true`. Earlier the `|| true` swallowed every
      # failure, making this check cosmetic. Real breaking changes must fail
      # the PR. cargo-semver-checks fails (exit 1) on violations by default;
      # the `--fail-on-error` flag was removed in a recent release and now
      # errors with "unexpected argument", so we pass only --workspace and
      # --all-features.
      # 注意：不要加 `|| true`。之前 `|| true` 吞掉所有失败，使检查形同虚设。
      # 真正的破坏性变更必须让 PR 失败。cargo-semver-checks 默认在违规时
      # 失败（exit 1）；`--fail-on-error` 在近期版本已移除，现在会报
      # "unexpected argument"，故只传 --workspace 和 --all-features。
      - name: Run semver checks
        run: |
          cargo semver-checks check-release \
            --workspace \
            --all-features

      - name: Generate semver report
        if: always()
        run: |
          echo "## 🔍 Semantic Versioning Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checking for breaking API changes..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow checks if your changes introduce breaking API changes" >> $GITHUB_STEP_SUMMARY
          echo "that would require a major version bump according to Semantic Versioning." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 What gets checked:" >> $GITHUB_STEP_SUMMARY
          echo "- Public API changes" >> $GITHUB_STEP_SUMMARY
          echo "- Trait method signatures" >> $GITHUB_STEP_SUMMARY
          echo "- Struct field visibility" >> $GITHUB_STEP_SUMMARY
          echo "- Enum variant changes" >> $GITHUB_STEP_SUMMARY
          echo "- Type parameter changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 Resources:" >> $GITHUB_STEP_SUMMARY
          echo "- [Semantic Versioning 2.0.0](https://semver.org/)" >> $GITHUB_STEP_SUMMARY
          echo "- [cargo-semver-checks](https://github.com/obi1kenobi/cargo-semver-checks)" >> $GITHUB_STEP_SUMMARY

  # ==============================================================================
  # Public API Diff / 公共 API 差异
  # ==============================================================================
  api-diff:
    name: Public API Diff
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-public-api
        run: cargo install cargo-public-api

      # Compute the real diff between origin/main and the PR head.
      #
      # NOTE: cargo-public-api does NOT support --workspace (it operates on one
      # crate at a time via rustdoc JSON). The old workflow passed --workspace,
      # which errored with "unexpected argument"; the `|| true` on the diff
      # step masked it, so the posted "diff" was always empty. We now loop over
      # every workspace library crate.
      # 注意：cargo-public-api 不支持 --workspace（它基于 rustdoc JSON 逐 crate
      # 操作）。旧 workflow 传 --workspace 会报 "unexpected argument"；diff 步骤的
      # `|| true` 掩盖了它，导致发布的 "diff" 永远为空。现在遍历每个 workspace
      # 库 crate。
      - name: Generate API diff
        run: |
          # Collect all library members of the workspace.
          CRATES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.targets[]?.kind | index(["lib"])) | .name' \
            | sort -u)

          : > /tmp/api-diff.txt

          for crate in $CRATES; do
            git checkout origin/main -- 2>/dev/null
            old=$(cargo public-api -p "$crate" --all-features 2>/dev/null || true)

            git checkout - -- 2>/dev/null
            new=$(cargo public-api -p "$crate" --all-features 2>/dev/null || true)

            # Produce a per-crate unified diff; skip crates with no changes.
            crate_diff=$(diff <(printf '%s' "$old") <(printf '%s' "$new") || true)
            if [ -n "$crate_diff" ]; then
              echo "### 📦 $crate" >> /tmp/api-diff.txt
              echo '```diff' >> /tmp/api-diff.txt
              echo "$crate_diff" >> /tmp/api-diff.txt
              echo '```' >> /tmp/api-diff.txt
              echo "" >> /tmp/api-diff.txt
            fi
          done

          if [ -s /tmp/api-diff.txt ]; then
            echo "📋 Public API changes detected (see /tmp/api-diff.txt)."
          else
            echo "✅ No public API changes detected."
            echo "No public API changes." > /tmp/api-diff.txt
          fi

      - name: Comment PR with API changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/api-diff.txt', 'utf8');
            const output = `## 📦 Public API Changes\n\n\`\`\`diff\n${diff}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
