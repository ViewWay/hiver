[package]
name = "hiver-micrometer"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = """
Metrics collection and monitoring inspired by Micrometer for Hiver Framework.
Hiver框架的指标收集与监控，灵感来自 Micrometer。
Equivalent to: Spring Boot Actuator Metrics, Micrometer
"""

[dependencies]
hiver-core = { path = "../hiver-core", version = "0.1.0-alpha.6" }

tokio = { workspace = true, features = ["full"] }

tracing = { workspace = true }
thiserror = { workspace = true }

# Serialization for export
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# OpenTelemetry support
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true, features = ["rt-tokio"] }

# Prometheus support
prometheus = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
criterion = { workspace = true }
