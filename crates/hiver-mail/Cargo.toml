[package]
name = "hiver-mail"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = """
Spring Mail equivalent for Hiver Framework.
Hiver框架的Spring Mail等价功能。
Provides async email sending with SMTP, template support, and Spring-style API.
"""
homepage = { workspace = true }
repository = { workspace = true }
readme = "./README.md"
keywords = { workspace = true }
license = { workspace = true }
categories = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
# Async runtime / 异步运行时
tokio = { workspace = true, features = ["sync", "rt"] }

# Async trait / 异步trait
async-trait = { workspace = true }

# Email / 邮件
# Equivalent to: Spring JavaMailSender (javax.mail)
lettre = { workspace = true }

# Serialization / 序列化
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Error handling / 错误处理
thiserror = { workspace = true }

# Tracing / 追踪
tracing = { workspace = true }

# MIME type detection / MIME类型检测
mime = "0.3"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
