[package]
name = "hiver-response"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = """
Response builders and types for Hiver Framework.
Hiver框架的响应构建器和类型。
Equivalent to: Spring ResponseEntity, @ResponseBody
"""
homepage = { workspace = true }
repository = { workspace = true }
readme = "./README.md"
keywords = { workspace = true }
license = { workspace = true }
categories = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["json"]
json = []
html = ["dep:tera"]
xml = []
sse = ["dep:tokio"]
ssr = ["dep:askama"]
handlebars = ["dep:handlebars"]
templates = ["dep:tera", "dep:askama", "dep:handlebars"]
full = ["json", "html", "xml", "sse", "ssr", "templates"]

[dependencies]
# HTTP types / HTTP类型 (Spring Web HTTP)
http = { workspace = true }
http-body = { workspace = true }

# Core types / 核心类型
hiver-core = { path = "../hiver-core", version = "0.1.0-alpha.6" }

# Serialization / 序列化 (Spring Jackson JSON)
serde = { workspace = true }
serde_json = { workspace = true }

# Bytes / 字节
bytes = { workspace = true }

# Error handling / 错误处理 (Spring @ResponseStatus)
thiserror = { workspace = true }
anyhow = { workspace = true }

# Content types / 内容类型 (Spring MediaType, Content-Type)
mime = { workspace = true }
mime_guess = { workspace = true }

# Template engines / 模板引擎 (Spring Thymeleaf, FreeMarker)
tera = { workspace = true, optional = true }
askama = { workspace = true, optional = true }
handlebars = { workspace = true, optional = true }

# Utilities / 工具
indexmap = { workspace = true }

# Time / 时间 (Spring LocalDateTime)
chrono = { workspace = true }

# Spreadsheet / 电子表格 (Spring Apache POI)
zip = { workspace = true }

# SSE (Server-Sent Events) / 服务器发送事件
tokio = { workspace = true, features = ["sync", "macros", "rt", "time"], optional = true }

[lints]
workspace = true

[dev-dependencies]
# Testing / 测试 (Spring Test)
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
